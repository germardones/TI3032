<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buzón de Sugerencias – TI3032</title>
  <meta name="description" content="Envía tus sugerencias, comentarios o consultas sobre el curso TI3032.">
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glass-background"></div>
  <main class="container">
    <div class="content-wrapper">
      <div class="nav-header">
        <a href="/index.html" class="back-link">← Volver al Menú Principal</a>
        <button onclick="toggleTheme()" class="nav-btn" style="padding: 0.3rem 0.8rem; font-size: 1.2rem; background: transparent; border: 1px solid var(--card-border); cursor: pointer; border-radius: 50px; color: var(--text-primary); display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; transition: all 0.3s;" aria-label="Cambiar tema">🌓</button>
      </div>

      <div class="page-card">
        <div style="text-align: center; margin-bottom: 2.5rem;">
          <span class="module-number" style="font-size: 1rem; margin-bottom: 0.8rem;">TI3032</span>
          <h1 style="font-size: 2.2rem; margin-bottom: 0.8rem;">Buzón de Sugerencias</h1>
          <p style="color: var(--text-secondary); max-width: 520px; margin: 0 auto; font-size: 1rem;">
            Comparte tus ideas, comentarios o consultas sobre el curso. Tu opinión nos ayuda a mejorar.
          </p>
        </div>

        <form id="suggestionForm" class="suggestion-form" novalidate>
          <div class="form-group">
            <label for="name" class="form-label">Nombre completo</label>
            <input
              type="text"
              id="name"
              name="name"
              class="form-input"
              placeholder="Ej: María González"
              required
              autocomplete="name"
            />
            <span class="field-error" id="nameError"></span>
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Correo institucional <span class="required-badge">@inacapmail.cl</span></label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="usuario@inacapmail.cl"
              required
              autocomplete="email"
            />
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="subject" class="form-label">Asunto</label>
            <select id="subject" name="subject" class="form-input form-select" required>
              <option value="" disabled selected>Selecciona una categoría</option>
              <option value="contenido">Contenido del curso</option>
              <option value="plataforma">Plataforma y navegación</option>
              <option value="ejercicios">Ejercicios y ejemplos</option>
              <option value="otro">Otro</option>
            </select>
            <span class="field-error" id="subjectError"></span>
          </div>

          <div class="form-group">
            <label for="message" class="form-label">Sugerencia o comentario</label>
            <textarea
              id="message"
              name="message"
              class="form-input form-textarea"
              placeholder="Describe tu sugerencia con el mayor detalle posible..."
              required
              rows="5"
            ></textarea>
            <span class="field-error" id="messageError"></span>
          </div>

          <button type="submit" class="submit-btn" id="submitBtn">
            <span id="btnText">Enviar sugerencia</span>
            <span id="btnLoader" style="display:none;">Enviando…</span>
          </button>
        </form>

        <div id="successMsg" class="form-success" style="display:none;">
          <div class="success-icon">✓</div>
          <h3>¡Sugerencia recibida!</h3>
          <p>Gracias por tu aporte. Revisaremos tu mensaje a la brevedad.</p>
          <button onclick="resetForm()" class="nav-btn" style="margin-top: 1.5rem; cursor: pointer;">Enviar otra sugerencia</button>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2026 German Mardones. Todos los derechos reservados.</p>
  </footer>

  <script>
    function toggleTheme() {
      const body = document.body;
      const current = body.getAttribute('data-theme') || 'dark';
      const next = current === 'light' ? 'dark' : 'light';
      next === 'dark' ? body.removeAttribute('data-theme') : body.setAttribute('data-theme', 'light');
      localStorage.setItem('theme', next);
    }
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') document.body.setAttribute('data-theme', 'light');

    function validateEmail(email) {
      return /^[^\s@]+@inacapmail\.cl$/i.test(email.trim());
    }

    function showError(fieldId, msg) {
      const el = document.getElementById(fieldId + 'Error');
      const input = document.getElementById(fieldId);
      el.textContent = msg;
      input.classList.add('input-error');
    }

    function clearError(fieldId) {
      const el = document.getElementById(fieldId + 'Error');
      const input = document.getElementById(fieldId);
      if (el) el.textContent = '';
      if (input) input.classList.remove('input-error');
    }

    ['name', 'email', 'subject', 'message'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', () => clearError(id));
    });

    document.getElementById('suggestionForm').addEventListener('submit', function (e) {
      e.preventDefault();
      let valid = true;

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const subject = document.getElementById('subject').value;
      const message = document.getElementById('message').value.trim();

      if (!name) { showError('name', 'El nombre es obligatorio.'); valid = false; }
      if (!email) {
        showError('email', 'El correo es obligatorio.');
        valid = false;
      } else if (!validateEmail(email)) {
        showError('email', 'Debes usar un correo con dominio @inacapmail.cl');
        valid = false;
      }
      if (!subject) { showError('subject', 'Selecciona una categoría.'); valid = false; }
      if (!message) { showError('message', 'El mensaje no puede estar vacío.'); valid = false; }

      if (!valid) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      document.getElementById('btnText').style.display = 'none';
      document.getElementById('btnLoader').style.display = 'inline';

      setTimeout(() => {
        document.getElementById('suggestionForm').style.display = 'none';
        document.getElementById('successMsg').style.display = 'flex';
      }, 800);
    });

    function resetForm() {
      document.getElementById('suggestionForm').reset();
      document.getElementById('suggestionForm').style.display = 'flex';
      document.getElementById('successMsg').style.display = 'none';
      const btn = document.getElementById('submitBtn');
      btn.disabled = false;
      document.getElementById('btnText').style.display = 'inline';
      document.getElementById('btnLoader').style.display = 'none';
      ['name', 'email', 'subject', 'message'].forEach(clearError);
    }
  </script>
</body>
</html>
